<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
  /* Sjednocený styl pro celou hru */
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow: hidden; }
    
    #bottom-panel {
        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
        /* Klíčová oprava: flex-wrap umožní prvkům odskočit na nový řádek, pokud není místo */
        display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 15px;
        background: #ffffff; padding: 12px 25px;
        border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        z-index: 100; color: #4a4a4a;
        width: max-content;
        max-width: 90vw; /* Zamezí přetečení menu mimo monitor */
    }

    /* Typografie */
    .game-title { font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: #2563eb; }
    .label { font-size: 12px; font-weight: 400; color: #aaa; }
    .value { font-size: 16px; font-weight: 500; color: #4a4a4a; }
    
    .divider { width: 2px; height: 24px; background: #eee; border-radius: 2px; }

    /* Rozbalovací prvky (auta, mapy) */
    .prop-dropdown { 
        background: #f8f8f8; border: 1px solid #eee; border-radius: 8px; 
        padding: 8px 12px; cursor: pointer; color: #4a4a4a; font-family: 'Inter'; font-weight: 500;
        outline: none; transition: 0.2s;
    }
    .prop-dropdown:hover { border-color: #ccc; }

    /* Akční tlačítka */
    .btn-action { 
        background: transparent; border: none; color: #888;
        width: 38px; height: 38px; cursor: pointer; font-size: 18px; transition: 0.2s;
        border-radius: 8px; display: flex; align-items: center; justify-content: center;
    }
    .btn-action:hover { color: #2563eb; background: #f0f4ff; }

    /* Timer - tabular nums pro zamezení třesení */
    .current { 
        font-size: 18px; 
        font-weight: 600; 
        font-variant-numeric: tabular-nums; 
        width: 100px; 
        text-align: center; 
        display: inline-block;
        color: #1f2937;
    }

    /* Vnitřní kontejnery pro snazší skládání */
    .timer-section, .action-buttons, .garage-section, .map-section {
        display: flex; align-items: center; gap: 10px;
    }

    /* Responzivita - jak se menu chová na menších monitorech / tabletech */
    @media (max-width: 1000px) {
        .divider { display: none; } /* Skryje čáry pro úsporu místa */
        #bottom-panel { padding: 10px 15px; gap: 10px; border-radius: 12px; }
    }
</style>
<style>
    #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex; align-items: center; justify-content: center;
        z-index: 999; transition: opacity 0.5s;
    }
    #play-button {
        padding: 15px 40px; font-size: 24px; font-weight: 700;
        background: #2563eb; color: white; border: none;
        border-radius: 50px; cursor: pointer;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }
    #play-button:hover { background: #1d4ed8; transform: scale(1.05); }
</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.3"
		}
	}
	</script>
</head>
<body>
<div id="start-overlay">
    <button id="play-button" onclick="startGame()" disabled>Loading...</button>
</div>

	<div id="bottom-panel">
    <div class="game-title">DRIFT POLYGON</div>
    <div class="divider"></div>

    <div class="map-section">
        <select id="map-select" class="prop-dropdown" onchange="changeMap()">
            <option value="default-map.json">Default Map</option>
            <option value="city-map.json">City Map</option>
        </select>
    </div>

    <div class="garage-section">
        <select id="vehicle-select" class="prop-dropdown">
           <option value="vehicle-truck-yellow">🟡 Yellow</option>
            <option value="vehicle-truck-green">🟢 Green</option>
            <option value="vehicle-truck-red">🔴 Red</option>
            <option value="vehicle-truck-purple">🟣 Purple</option>
        </select>
    </div>
    
    <div class="timer-section">
        <span class="label">ROUND</span> <span class="value lap">1</span>
        <span class="value current" style="margin: 0 15px;">0:00.00</span>
		    <span class="label">LAST</span> <span class="value last">0:00.00</span>
        <span class="label">BEST</span> <span class="value best">0:00.00</span>
    </div>

    <div class="action-buttons">
        <button class="btn-action" title="Editor" onclick="window.location.href='editor.html'"><i class="fas fa-pencil"></i></button>
        <button class="btn-action" title="Nahrát vlastní mapu z PC" onclick="document.getElementById('map-upload').click()"><i class="fas fa-folder-open"></i></button>
        <button class="btn-action" title="Fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
        <button class="btn-action" title="Reset" onclick="resetGame()"><i class="fas fa-rotate-right"></i></button>
		<button class="btn-action" title="Hudba" onclick="toggleMusic()">
            <input type="file" id="map-upload" accept=".json" style="display: none;" onchange="loadLocalMap(event)">

    <i class="fas fa-music"></i>
</button>
    </div>
</div>
<script>
    function loadLocalMap(event) {
        const file = event.target.files[0];
        if (!file) return; // Pokud hráč výběr zruší, nic neděláme

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                // Pokusíme se soubor přečíst jako JSON
                const jsonData = JSON.parse(e.target.result);
                
                // Uložíme ho do dočasné paměti prohlížeče (smaže se zavřením okna)
                sessionStorage.setItem('customLoadedMap', JSON.stringify(jsonData));
                
                // Znovu načteme hru se speciálním parametrem 'local'
                window.location.href = window.location.pathname + '?map=local';
            } catch (err) {
                alert('Chyba! Vybraný soubor pravděpodobně není platná mapa z editoru.');
            }
        };
        // Přečteme soubor jako text
        reader.readAsText(file);
    }
</script>
<script>
    // 1. Při načtení stránky nastavíme dropdown na mapu, která je zrovna v URL
    window.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const currentMap = urlParams.get('map') || 'default-map.json';
        const mapDropdown = document.getElementById('map-select');
        if (mapDropdown) {
            mapDropdown.value = currentMap;
        }
    });

    // 2. Jakmile hráč vybere jinou mapu, stránka se znovu načte s novým parametrem
    function changeMap() {
        const selectedMap = document.getElementById('map-select').value;
        // Přepíše URL na např. http://localhost:7000/index.html?map=city-map.json
        window.location.href = window.location.pathname + '?map=' + selectedMap;
    }
</script>

<script>
    function startGame() {
        // Skryje overlay
        const overlay = document.getElementById('start-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 500);

        // Tady zavoláme funkci, která spustí hudbu (definovanou v main.js)
        if (window.toggleMusic) {
            // Pokud chceme hudbu spustit automaticky hned po kliku:
            const m = window.myMusic;
            if (m && m.context.state === 'suspended') m.context.resume();
            if (m && !m.isPlaying) m.play();
        }
    }
</script>
<script>
    function toggleMusic() {
        if (window.toggleMusic) window.toggleMusic();
    }
</script>
	<script>
		// Funkce pro celou obrazovku
		function toggleFullscreen() {
			if (!document.fullscreenElement) {
				document.documentElement.requestFullscreen().catch(err => {
					console.warn(`Chyba při spouštění fullscreenu: ${err.message}`);
				});
			} else {
				if (document.exitFullscreen) {
					document.exitFullscreen();
				}
			}
		}

		// Funkce pro resetování hry a časů
		function resetGame() {
			if(confirm('Opravdu chceš vymazat traťový rekord a restartovat hru?')) {
				// Projde paměť prohlížeče a smaže všechny uložené nejlepší časy z této hry
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key && key.startsWith('racing.bestLap')) {
						localStorage.removeItem(key);
					}
				}
				// Okamžitě obnoví stránku, čímž hru restartuje od nuly
				window.location.reload();
			}
		}
	</script>
	<script type="module" src="js/main.js"></script>
</body>
</html>
