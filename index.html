<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Racing</title>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
    /* Sjednocený styl pro celou hru */
    body { font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
    
    #bottom-panel {
        position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%);
        display: flex; align-items: center; gap: 20px;
        background: #ffffff; padding: 12px 20px;
        border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        z-index: 100; color: #4a4a4a;
    }

    /* Typografie - vše stejným fontem, bez zbytečné tučnosti */
    .game-title { font-size: 16px; font-weight: 500; text-transform: uppercase; letter-spacing: 1px; color: #888; }
    .label { font-size: 12px; font-weight: 400; color: #aaa; }
    .value { font-size: 16px; font-weight: 500; color: #4a4a4a; }
    
    /* Dropdown - sjednocený vzhled */
    .prop-dropdown { 
        background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; 
        padding: 6px 10px; cursor: pointer; color: #4a4a4a; font-family: 'Inter';
    }

    /* Tlačítka - jemná a ikonická */
    .btn-action { 
        background: transparent; border: none; color: #888;
        width: 35px; height: 35px; cursor: pointer; font-size: 16px; transition: 0.2s;
    }
    .btn-action:hover { color: #4a4a4a; }

	.current { 
    font-size: 16px; 
    font-weight: 500; 
    font-variant-numeric: tabular-nums; /* TOTO JE KLÍČ K OPRAVĚ */
    width: 120px;                      /* Pevná šířka pro čas */
    text-align: center; 
    display: inline-block;             /* Aby šířka fungovala */
}
</style>
<style>
    #start-overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(255, 255, 255, 0.9);
        display: flex; align-items: center; justify-content: center;
        z-index: 999; transition: opacity 0.5s;
    }
    #play-button {
        padding: 15px 40px; font-size: 24px; font-weight: 700;
        background: #2563eb; color: white; border: none;
        border-radius: 50px; cursor: pointer;
        box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
    }
    #play-button:hover { background: #1d4ed8; transform: scale(1.05); }
</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/",
			"crashcat": "https://esm.sh/crashcat@0.0.3"
		}
	}
	</script>
</head>
<body>
<div id="start-overlay">
    <button id="play-button" onclick="startGame()" disabled>Loading...</button>
</div>

	<div id="bottom-panel">
    <div class="game-title">DRIFT POLYGON</div>
    <div class="divider"></div>

    <div class="garage-section">
        <select id="vehicle-select" class="prop-dropdown">
            <option value="vehicle-truck-yellow">YELLOW</option>
            <option value="vehicle-truck-green">GREEN</option>
            <option value="vehicle-truck-red">RED</option>
            <option value="vehicle-truck-purple">PURPLE</option>
        </select>
    </div>
    
    <div class="timer-section">
        <span class="label">ROUND</span> <span class="value lap">1</span>
        <span class="value current" style="margin: 0 15px;">0:00.00</span>
		    <span class="label">LAST</span> <span class="value last">0:00.00</span>
        <span class="label">BEST</span> <span class="value best">0:00.00</span>
    </div>

    <div class="action-buttons">
        <button class="btn-action" title="Editor" onclick="window.location.href='editor.html'"><i class="fas fa-pencil"></i></button>
        <button class="btn-action" title="Fullscreen" onclick="toggleFullscreen()"><i class="fas fa-expand"></i></button>
        <button class="btn-action" title="Reset" onclick="resetGame()"><i class="fas fa-rotate-right"></i></button>
		<button class="btn-action" title="Hudba" onclick="toggleMusic()">
    <i class="fas fa-music"></i>
</button>
    </div>
</div>
<script>
    function startGame() {
        // Skryje overlay
        const overlay = document.getElementById('start-overlay');
        overlay.style.opacity = '0';
        setTimeout(() => overlay.remove(), 500);

        // Tady zavoláme funkci, která spustí hudbu (definovanou v main.js)
        if (window.toggleMusic) {
            // Pokud chceme hudbu spustit automaticky hned po kliku:
            const m = window.myMusic;
            if (m && m.context.state === 'suspended') m.context.resume();
            if (m && !m.isPlaying) m.play();
        }
    }
</script>
<script>
    function toggleMusic() {
        if (window.toggleMusic) window.toggleMusic();
    }
</script>
	<script>
		// Funkce pro celou obrazovku
		function toggleFullscreen() {
			if (!document.fullscreenElement) {
				document.documentElement.requestFullscreen().catch(err => {
					console.warn(`Chyba při spouštění fullscreenu: ${err.message}`);
				});
			} else {
				if (document.exitFullscreen) {
					document.exitFullscreen();
				}
			}
		}

		// Funkce pro resetování hry a časů
		function resetGame() {
			if(confirm('Opravdu chceš vymazat traťový rekord a restartovat hru?')) {
				// Projde paměť prohlížeče a smaže všechny uložené nejlepší časy z této hry
				for (let i = 0; i < localStorage.length; i++) {
					const key = localStorage.key(i);
					if (key && key.startsWith('racing.bestLap')) {
						localStorage.removeItem(key);
					}
				}
				// Okamžitě obnoví stránku, čímž hru restartuje od nuly
				window.location.reload();
			}
		}
	</script>
	<script type="module" src="js/main.js"></script>
</body>
</html>
