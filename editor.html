<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
	<title>Track Editor</title>
	<style>
		* { box-sizing: border-box; }
		body { margin: 0; overflow: hidden; background: #000; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
		canvas { display: block; touch-action: none; }

		#toolbar {
			position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
			display: flex; align-items: center; gap: 6px; padding: 8px 10px;
			background: rgba(255, 255, 255, 0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
			border-radius: 999px; border: 1px solid rgba(0, 0, 0, 0.06); box-shadow: 0 10px 30px rgba(0, 0, 0, 0.18);
			z-index: 10;
		}

		#toolbar button {
			padding: 9px; border: none; border-radius: 999px; background: transparent;
			color: #4a5260; cursor: pointer; transition: all 0.15s;
			display: flex; align-items: center; justify-content: center;
		}
		#toolbar button svg { width: 20px; height: 20px; display: block; }
		#toolbar button:hover { background: rgba(0, 0, 0, 0.05); color: #1f2430; }
		#toolbar button.active { background: #1f2430; color: #fff; box-shadow: 0 2px 6px rgba(31, 36, 48, 0.25); }
		.separator { width: 1px; height: 24px; background: rgba(0, 0, 0, 0.1); margin: 0 2px; flex-shrink: 0; }
		.prop-dropdown {
			background: transparent; border: 1px solid rgba(0,0,0,0.1); border-radius: 8px;
			padding: 6px 10px; font-family: inherit; font-size: 13px; color: #1f2430;
			cursor: pointer; outline: none; margin: 0 4px;
		}
		#toolbar button.action { background: #4caf6a; color: #fff; }
		#toolbar button.action:hover { background: #3f9a5a; color: #fff; }
		#toolbar button.danger { color: #b3603a; }
		#toolbar button.danger:hover { background: rgba(220, 100, 60, 0.12); color: #a64b25; }
		#toast {
			position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%);
			padding: 10px 24px; background: rgba(255, 255, 255, 0.95);
			border-radius: 999px; font-size: 13px; opacity: 0; transition: opacity 0.3s;
			pointer-events: none; z-index: 20;
		}
		#toast.show { opacity: 1; }
	</style>
	<script type="importmap">
	{
		"imports": {
			"three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.js",
			"three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
		}
	}
	</script>
</head>

<body>
	<div id="toolbar">
		<button id="btn-pan" title="Posun mapy (3)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg></button>
		<button id="btn-erase" title="Guma (2)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg></button>
		
		<div class="separator"></div>
		
		<select id="road-select" class="prop-dropdown" title="Díly trati">
			<option value="track-straight">Rovinka (Straight)</option>
			<option value="track-corner">Zatáčka (Corner)</option>
			<option value="track_x">Křižovatka (Cross)</option>
			<option value="track-finish">Start / Cíl</option>
		</select>
		<button id="btn-road" class="active" title="Stavět silnici (1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>

		<div class="separator"></div>

<select id="prop-select" class="prop-dropdown" title="Dekorace">
			<option value="decoration-forest">Les</option>
			<option value="pine">Borovice</option>
			<option value="pine-fall">Spadlá borovice</option>
			<option value="tree_k">Strom K</option>
			<option value="twisted_tree">Křivý strom</option>
			<option value="house2">Dům</option>
			<option value="decoration-tents">Stany</option>
			<option value="fence">Plot</option>
			<option value="fence_long">Dlouhý plot</option>
			<option value="traffic_barrier">Bariéra</option>
			<option value="wheels_stack">Kola na sobě</option>
			<option value="town_sign">Cedule města</option>
			<option value="stop_sign">Stopka</option>
			<option value="brash_bag">Pytel s odpadky</option>
			<option value="r2">Objekt R2</option>
			<option value="track-bump">Skála (Bump)</option>
			<option value="tire">Pneumatika (Tire)</option>
			<option value="decoration-empty">Prázdná plocha</option>
		</select>
		<button id="btn-prop" title="Umístit dekoraci (4)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22v-6"/><path d="M5.5 16h13l-4-5.5h3L12 2 6.5 10.5h3z"/></svg></button>

		<div class="separator"></div>

		<button id="btn-rotate" title="Otočit o 90° (R)">
			<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10"/><path d="M3.51 15A9 9 0 0 0 18.36 18.36L23 14"/></svg>
			<span id="rot-label" style="font-size:12px; margin-left:4px; font-weight:bold;">0°</span>
		</button>

		<div class="separator"></div>

		<button id="btn-zoom-in" title="Přiblížit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>
		<button id="btn-zoom-out" title="Oddálit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg></button>

		<div class="separator"></div>
		<button id="btn-play" class="action" title="Play track"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg></button>
		<button id="btn-export" title="Export Map to JSON" style="background:#1f2430; color:#fff;">Export JSON</button>
		<div class="separator"></div>
		<button id="btn-clear" class="danger" title="Clear track"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></svg></button>
	</div>

	<div id="toast"></div>

	<script type="module">
		import * as THREE from 'three';
		import { CELL_RAW, GRID_SCALE } from './js/Track.js';
		import { ColorMapGLTFLoader } from './js/Loader.js';

		const grid = new Map();
		const customProps = [];
		let tool = 'road'; // 'road', 'prop', 'erase', 'pan'
		let currentRot = 0; // Globální rotace

		function cellKey(gx, gz) { return gx + ',' + gz; }

		const renderer = new THREE.WebGLRenderer({ antialias: true });
		renderer.setSize(window.innerWidth, window.innerHeight);
		renderer.setPixelRatio(window.devicePixelRatio);
		renderer.shadowMap.enabled = true;
		renderer.toneMapping = THREE.ACESFilmicToneMapping;
		renderer.toneMappingExposure = 1.0;
		document.body.appendChild(renderer.domElement);

		const scene = new THREE.Scene();
		scene.background = new THREE.Color(0x87CEEB);
		scene.fog = new THREE.Fog(0x87CEEB, 80, 200);

		const dirLight = new THREE.DirectionalLight(0xffffff, 5);
		dirLight.position.set(11.4, 15, - 5.3);
		dirLight.castShadow = true;
		dirLight.shadow.mapSize.setScalar(4096);
		dirLight.shadow.camera.near = 0.5; dirLight.shadow.camera.far = 100;
		dirLight.shadow.camera.left = - 60; dirLight.shadow.camera.right = 60;
		dirLight.shadow.camera.top = 60; dirLight.shadow.camera.bottom = - 60;
		scene.add(dirLight);

		const hemiLight = new THREE.HemisphereLight(0xc8d8e8, 0x7a8a5a, 1.5);
		scene.add(hemiLight);

		const gridSize = 100;
		const cellWorld = CELL_RAW * GRID_SCALE;
		const worldSize = gridSize * cellWorld;

		const groundMat = new THREE.MeshStandardMaterial({ color: 0x4caf50, metalness: 0 });
		const ground = new THREE.Mesh(new THREE.PlaneGeometry(worldSize, worldSize), groundMat);
		ground.rotation.x = - Math.PI / 2; ground.position.y = - 0.14; ground.receiveShadow = true;
		scene.add(ground);

		const gridHelper = new THREE.GridHelper(worldSize, gridSize, 0x1a4a36, 0x1a4a36);
		gridHelper.position.y = - 0.13; gridHelper.material.opacity = 0.25;
		gridHelper.material.transparent = true; gridHelper.material.depthTest = false; gridHelper.renderOrder = 1;
		scene.add(gridHelper);

		const trackGroup = new THREE.Group(); trackGroup.position.y = - 0.5; trackGroup.scale.setScalar(GRID_SCALE); scene.add(trackGroup);
		const propsGroup = new THREE.Group(); propsGroup.position.y = - 0.5; propsGroup.scale.setScalar(GRID_SCALE); scene.add(propsGroup);
		const ghostGroup = new THREE.Group(); ghostGroup.position.y = - 0.5; ghostGroup.scale.setScalar(GRID_SCALE); scene.add(ghostGroup);

		const frustum = 30;
		const aspect = window.innerWidth / window.innerHeight;
		const camera = new THREE.OrthographicCamera(- frustum * aspect, frustum * aspect, frustum, - frustum, 0.1, 200);
		const cellCenter = 0.5 * CELL_RAW * GRID_SCALE;

		function computeCamOffsetZ() {
			const rect = document.getElementById('toolbar').getBoundingClientRect();
			const pad = window.innerHeight - rect.bottom;
			const reserved = window.innerHeight - rect.top + pad;
			return reserved / window.innerHeight * frustum;
		}

		let camOffsetZ = computeCamOffsetZ();
		camera.position.set(cellCenter, 50, cellCenter + camOffsetZ);
		camera.lookAt(cellCenter, 0, cellCenter + camOffsetZ);
		const camTarget = new THREE.Vector3(cellCenter, 0, cellCenter + camOffsetZ);

		window.addEventListener('resize', () => {
			const a = window.innerWidth / window.innerHeight;
			camera.left = - frustum * a; camera.right = frustum * a;
			const newOffset = computeCamOffsetZ();
			const dz = newOffset - camOffsetZ; camOffsetZ = newOffset;
			camTarget.z += dz; camera.position.z += dz; camera.lookAt(camTarget.x, 0, camTarget.z);
			camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight);
		});

		document.getElementById('btn-export').addEventListener('click', () => {
			save();
			const rawData = localStorage.getItem('racing-editor-data');
			if (!rawData) { showToast('No map data to export!'); return; }
			const blob = new Blob([rawData], { type: 'application/json' });
			const url = URL.createObjectURL(blob);
			const a = document.createElement('a');
			a.href = url; a.download = 'default-map.json';
			document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
			showToast('Map exported!');
		});

		const loader = new ColorMapGLTFLoader();
		
		const modelNames = [
			'track-straight', 'track-corner', 'track-bump', 'track-finish', 'track_x', 
			'decoration-forest', 'decoration-empty', 'pine', 'pine-fall', 'tire',
			'brash_bag', 'house2', 'town_sign', 'traffic_barrier', 'tree_k', 
			'twisted_tree', 'wheels_stack', 'fence', 'fence_long', 'r2', 'stop_sign', 'decoration-tents'
		];


		const models = {};

		async function loadModels() {
			const promises = modelNames.map((name) =>
				new Promise((resolve, reject) => {
					loader.load(`models/${name}.glb`, (gltf) => {
						gltf.scene.traverse((child) => { if (child.isMesh) child.material.side = THREE.FrontSide; });
						models[name] = gltf.scene; resolve();
					}, undefined, reject);
				})
			);
			await Promise.all(promises);
		}

		function placeMesh(gx, gz, cell) {
			if (cell.mesh) trackGroup.remove(cell.mesh);
			const src = models[cell.type]; if (!src) return;
			const mesh = src.clone(); mesh.position.set((gx + 0.5) * CELL_RAW, 0.5, (gz + 0.5) * CELL_RAW);
			mesh.rotation.y = THREE.MathUtils.degToRad(cell.orient || 0);
			mesh.traverse((c) => { if (c.isMesh) { c.castShadow = true; c.receiveShadow = true; } });
			trackGroup.add(mesh); cell.mesh = mesh;
		}

		function placeRoad(gx, gz) {
			const key = cellKey(gx, gz);
			const type = document.getElementById('road-select').value;
			const cell = { type: type, orient: currentRot, isFinish: (type === 'track-finish'), mesh: null };
			
			if (grid.has(key)) {
				const old = grid.get(key);
				if (old.mesh) trackGroup.remove(old.mesh);
			}
			
			grid.set(key, cell);
			placeMesh(gx, gz, cell);
			save();
		}

		function eraseRoad(gx, gz) {
			const key = cellKey(gx, gz); if (!grid.has(key)) return;
			const cell = grid.get(key); 
			if (cell.mesh) trackGroup.remove(cell.mesh); 
			grid.delete(key);
			save();
		}

		function clearAll() {
			for (const [, cell] of grid) { if (cell.mesh) trackGroup.remove(cell.mesh); }
			while (propsGroup.children.length > 0) { propsGroup.remove(propsGroup.children[0]); }
			grid.clear(); customProps.length = 0; save();
		}

		function addGhostPiece(type, rot, x, z, opacity) {
			const src = models[type]; if (!src) return;
			const mesh = src.clone(); 
			mesh.position.set((x + 0.5) * CELL_RAW, 0.5, (z + 0.5) * CELL_RAW);
			mesh.rotation.y = THREE.MathUtils.degToRad(rot || 0);

			// --- ÚPRAVA MĚŘÍTKA A ROTACE PRO EDITOR ---
			if (type === 'stop_sign') { mesh.scale.set(0.2, 0.2, 0.2); mesh.rotateX(-Math.PI / 2); }
			else if (type === 'house2') { mesh.scale.set(0.2, 0.2, 0.2); }
			else if (type === 'twisted_tree') { mesh.scale.set(0.25, 0.25, 0.25); }
			else if (type === 'decoration-tents') { mesh.scale.set(0.25, 0.25, 0.25); }
			else if (type === 'track-bump') { mesh.scale.set(2.0, 2.0, 2.0); }
			// ------------------------------------------

			mesh.traverse((c) => { if (c.isMesh) { c.material = c.material.clone(); c.material.transparent = true; c.material.opacity = opacity; } });
			ghostGroup.add(mesh);
		}

		function updateGhost(gx, gz) {
			clearGhost(); 
			if (tool === 'road') {
				addGhostPiece(document.getElementById('road-select').value, currentRot, gx, gz, 0.4);
			} else if (tool === 'prop') {
				addGhostPiece(document.getElementById('prop-select').value, currentRot, gx, gz, 0.4);
			}
		}

		function clearGhost() {
			while (ghostGroup.children.length > 0) { ghostGroup.remove(ghostGroup.children[0]); }
		}

		const raycaster = new THREE.Raycaster();
		const mouse = new THREE.Vector2();

		function screenToGrid(clientX, clientY) {
			mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = - (clientY / window.innerHeight) * 2 + 1;
			raycaster.setFromCamera(mouse, camera);
			const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0.51); const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, hit);
			if (!hit) return null;
			return { gx: Math.floor(hit.x / cellWorld), gz: Math.floor(hit.z / cellWorld) };
		}

		function screenToWorldLocal(clientX, clientY) {
			mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = - (clientY / window.innerHeight) * 2 + 1;
			raycaster.setFromCamera(mouse, camera);
			const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0.51); const hit = new THREE.Vector3(); raycaster.ray.intersectPlane(plane, hit);
			if (!hit) return null;
			return { x: hit.x / GRID_SCALE, z: hit.z / GRID_SCALE };
		}

		function placeProp(type, x, z, rotRad) {
			const prop = { id: Date.now() + Math.random(), type, x, z, rot: rotRad };
			customProps.push(prop); renderProp(prop); save();
		}

		function renderProp(prop) {
			const src = models[prop.type]; if (!src) return;
			const mesh = src.clone(); 
			mesh.position.set(prop.x, 0.5, prop.z); 
			mesh.rotation.y = prop.rot; 

			// --- ÚPRAVA MĚŘÍTKA A ROTACE PRO EDITOR ---
			if (prop.type === 'stop_sign') { mesh.scale.set(0.2, 0.2, 0.2); mesh.rotateX(-Math.PI / 2); }
			else if (prop.type === 'house2') { mesh.scale.set(0.2, 0.2, 0.2); }
			else if (prop.type === 'twisted_tree') { mesh.scale.set(0.25, 0.25, 0.25); }
			else if (prop.type === 'decoration-tents') { mesh.scale.set(0.25, 0.25, 0.25); }
			else if (prop.type === 'track-bump') { mesh.scale.set(2.0, 2.0, 2.0); }
			// ------------------------------------------

			mesh.userData.id = prop.id;
			propsGroup.add(mesh);
		}

		function eraseProp(clientX, clientY) {
			mouse.x = (clientX / window.innerWidth) * 2 - 1; mouse.y = - (clientY / window.innerHeight) * 2 + 1;
			raycaster.setFromCamera(mouse, camera); const intersects = raycaster.intersectObjects(propsGroup.children, true);
			if (intersects.length > 0) {
				let obj = intersects[0].object; while (obj.parent && obj.parent !== propsGroup) obj = obj.parent;
				if (obj.userData && obj.userData.id) {
					const id = obj.userData.id; const idx = customProps.findIndex(p => p.id === id);
					if (idx > -1) customProps.splice(idx, 1);
					propsGroup.remove(obj); save(); return true;
				}
			}
			return false;
		}

		function save() {
			const trackArr = []; for (const [key, cell] of grid) { const [gx, gz] = key.split(',').map(Number); trackArr.push([gx, gz, cell.type, cell.orient]); }
			localStorage.setItem('racing-editor-data', JSON.stringify({ track: trackArr, props: customProps }));
		}

		function loadSaved() {
			const rawData = localStorage.getItem('racing-editor-data'); if (!rawData) return;
			try {
				const data = JSON.parse(rawData);
				if (data.track) {
					for (const [gx, gz, type, orient] of data.track) {
						const isFinish = (type === 'track-finish'); const cell = { type, orient, isFinish, mesh: null };
						grid.set(cellKey(gx, gz), cell); placeMesh(gx, gz, cell);
					}
				}
				if (data.props) { for (const prop of data.props) { customProps.push(prop); renderProp(prop); } }
			} catch (e) { console.warn('Nepodařilo se načíst JSON mapu', e); }
		}

		let toastTimer = 0;
		function showToast(msg) {
			const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
			clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
		}

		const btnRoad = document.getElementById('btn-road');
		const btnErase = document.getElementById('btn-erase');
		const btnPan = document.getElementById('btn-pan');
		const btnProp = document.getElementById('btn-prop');
		const roadSelect = document.getElementById('road-select');
		const propSelect = document.getElementById('prop-select');

		function selectTool(t) {
			tool = t;
			btnRoad.classList.toggle('active', t === 'road');
			btnErase.classList.toggle('active', t === 'erase');
			btnPan.classList.toggle('active', t === 'pan');
			btnProp.classList.toggle('active', t === 'prop');
			if (t === 'pan') clearGhost(); updateCursor();
		}

		btnRoad.addEventListener('click', () => selectTool('road'));
		btnProp.addEventListener('click', () => selectTool('prop'));
		btnErase.addEventListener('click', () => selectTool('erase'));
		btnPan.addEventListener('click', () => selectTool('pan'));

		// OBSLUHA TLAČÍTKA ROTACE
		function rotateTool() {
			currentRot = (currentRot - 90) % 360;
			if(currentRot < 0) currentRot += 360;
			document.getElementById('rot-label').textContent = currentRot + '°';
			if(lastDrawCell) updateGhost(lastDrawCell.gx, lastDrawCell.gz);
		}
		document.getElementById('btn-rotate').addEventListener('click', rotateTool);

		document.getElementById('btn-zoom-in').addEventListener('click', () => {
			camera.zoom = Math.min(10, camera.zoom * 1.25); camera.updateProjectionMatrix();
		});
		document.getElementById('btn-zoom-out').addEventListener('click', () => {
			camera.zoom = Math.max(0.1, camera.zoom / 1.25); camera.updateProjectionMatrix();
		});

		document.getElementById('btn-play').addEventListener('click', () => {
			if (grid.size === 0) { showToast('Není postavena žádná silnice!'); return; }
			save(); window.open('index.html', '_blank');
		});

		document.getElementById('toolbar').addEventListener('pointerenter', clearGhost);

		document.getElementById('btn-clear').addEventListener('click', () => {
			if (!confirm('Smazat celou mapu?')) return;
			clearAll(); showToast('Mapa vymazána');
		});

		let isPanning = false; let isDrawing = false; let isErasing = false; let panStart = { x: 0, y: 0 }; let camStart = { x: 0, z: 0 }; let lastDrawCell = null; let spaceDown = false;
		const pointers = new Map(); let pinchStartDist = 0; let pinchStartZoom = 1; const el = renderer.domElement;

		function updateCursor() {
			if (isPanning) el.style.cursor = 'grabbing'; else if (spaceDown || tool === 'pan') el.style.cursor = 'grab'; else el.style.cursor = '';
		}

		el.addEventListener('contextmenu', (e) => e.preventDefault());

		function handleDraw(clientX, clientY) {
			if (isErasing || tool === 'erase') {
				const erasedProp = eraseProp(clientX, clientY);
				if (!erasedProp) { const cell = screenToGrid(clientX, clientY); if (cell) eraseRoad(cell.gx, cell.gz); }
				lastDrawCell = true; return;
			}
			if (tool === 'prop') {
				if (isDrawing && !lastDrawCell) { 
					const pos = screenToWorldLocal(clientX, clientY); 
					if (pos) placeProp(propSelect.value, pos.x, pos.z, THREE.MathUtils.degToRad(currentRot)); 
				}
				lastDrawCell = true; return;
			}
			if (tool === 'road') {
				const cell = screenToGrid(clientX, clientY); if (!cell) return;
				if (lastDrawCell && lastDrawCell.gx === cell.gx && lastDrawCell.gz === cell.gz) return;
				lastDrawCell = cell;
				if (isDrawing) placeRoad(cell.gx, cell.gz);
			}
		}

		function getPinchDist() { const pts = [...pointers.values()]; const dx = pts[1].x - pts[0].x; const dy = pts[1].y - pts[0].y; return Math.sqrt(dx * dx + dy * dy); }
		function getPinchMid() { const pts = [...pointers.values()]; return { x: (pts[0].x + pts[1].x) / 2, y: (pts[0].y + pts[1].y) / 2 }; }

		el.addEventListener('pointerdown', (e) => {
			el.setPointerCapture(e.pointerId); pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
			if (pointers.size === 2) {
				isDrawing = false; isErasing = false; isPanning = true;
				const mid = getPinchMid(); panStart.x = mid.x; panStart.y = mid.y; camStart.x = camTarget.x; camStart.z = camTarget.z; pinchStartDist = getPinchDist(); pinchStartZoom = camera.zoom; return;
			}
			if (pointers.size > 2) return;
			if (e.button === 1 || (e.button === 0 && (e.ctrlKey || e.metaKey || spaceDown || tool === 'pan'))) {
				isPanning = true; panStart.x = e.clientX; panStart.y = e.clientY; camStart.x = camTarget.x; camStart.z = camTarget.z; updateCursor(); return;
			}
			if (e.button === 0) { if (tool === 'erase') isErasing = true; else isDrawing = true; lastDrawCell = null; if (e.pointerType !== 'touch') handleDraw(e.clientX, e.clientY); } 
			else if (e.button === 2) { isErasing = true; lastDrawCell = null; handleDraw(e.clientX, e.clientY); }
		});

		el.addEventListener('pointermove', (e) => {
			pointers.set(e.pointerId, { x: e.clientX, y: e.clientY });
			if (pointers.size === 2 && isPanning) {
				const mid = getPinchMid(); const scale = frustum * 2 / window.innerHeight / camera.zoom;
				camTarget.x = camStart.x - (mid.x - panStart.x) * scale; camTarget.z = camStart.z - (mid.y - panStart.y) * scale;
				camera.position.x = camTarget.x; camera.position.z = camTarget.z; camera.lookAt(camTarget.x, 0, camTarget.z);
				const dist = getPinchDist(); camera.zoom = Math.max(0.1, Math.min(10, pinchStartZoom * (dist / pinchStartDist))); camera.updateProjectionMatrix(); return;
			}
			if (isPanning) {
				const zoom = camera.zoom; const dx = (e.clientX - panStart.x) / window.innerWidth * frustum * 2 * (window.innerWidth / window.innerHeight) / zoom; const dz = (e.clientY - panStart.y) / window.innerHeight * frustum * 2 / zoom;
				camTarget.x = camStart.x - dx; camTarget.z = camStart.z - dz;
				camera.position.x = camTarget.x; camera.position.z = camTarget.z; camera.lookAt(camTarget.x, 0, camTarget.z); return;
			}
			if (isDrawing || isErasing) { handleDraw(e.clientX, e.clientY); return; }
			if (e.pointerType === 'mouse') {
				if (tool === 'prop') {
					const pos = screenToWorldLocal(e.clientX, e.clientY);
					if (pos) { clearGhost(); addGhostPiece(propSelect.value, currentRot, pos.x / CELL_RAW - 0.5, pos.z / CELL_RAW - 0.5, 0.6); }
				} else {
					const cell = screenToGrid(e.clientX, e.clientY); 
					if (cell) {
						updateGhost(cell.gx, cell.gz);
						lastDrawCell = cell; // ukládáme pro rotaci
					} else clearGhost();
				}
			}
		});

		window.addEventListener('pointerup', (e) => {
			pointers.delete(e.pointerId);
			if (pointers.size === 0) { if ((isDrawing || isErasing) && lastDrawCell === null && !isPanning) { handleDraw(e.clientX, e.clientY); } isPanning = false; isDrawing = false; isErasing = false; lastDrawCell = null; updateCursor(); }
		});

		window.addEventListener('pointercancel', (e) => pointers.delete(e.pointerId));

		el.addEventListener('wheel', (e) => {
			e.preventDefault();
			if (e.ctrlKey) {
				const zoomSpeed = 1.02; camera.zoom *= e.deltaY > 0 ? 1 / zoomSpeed : zoomSpeed;
				camera.zoom = Math.max(0.1, Math.min(10, camera.zoom)); camera.updateProjectionMatrix();
			} else {
				const scale = frustum * 2 / window.innerHeight / camera.zoom;
				camTarget.x += e.deltaX * scale; camTarget.z += e.deltaY * scale;
				camera.position.x = camTarget.x; camera.position.z = camTarget.z; camera.lookAt(camTarget.x, 0, camTarget.z);
			}
		}, { passive: false });

		window.addEventListener('keydown', (e) => {
			if (e.key === ' ') { if (!spaceDown) { spaceDown = true; updateCursor(); } e.preventDefault(); } 
			else if (e.key === '1') selectTool('road');
			else if (e.key === '2') selectTool('erase');
			else if (e.key === '3') selectTool('pan');
			else if (e.key === '4') selectTool('prop');
			else if (e.key.toLowerCase() === 'r') rotateTool(); 
		});

		window.addEventListener('keyup', (e) => { if (e.key === ' ') { spaceDown = false; updateCursor(); } });

		await loadModels(); loadSaved();

		function animate() { requestAnimationFrame(animate); renderer.render(scene, camera); } animate();
	</script>
</body>
</html>
